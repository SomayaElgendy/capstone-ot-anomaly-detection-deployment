    container_name: network_telemetry
    privileged: true
    network_mode: host
    environment:
    - REDIS_HOST=192.168.0.200
    - REDIS_PORT=6379
    - CAPTURE_CONTAINERS=veth*
    - FLOW_WINDOW=1.0
    restart: unless-stopped
    depends_on:
    - redis
networks:
  vlan1:
    driver: bridge
    name: ics_simlab
    ipam:
      config:
      - subnet: 192.168.0.0/24
    driver_opts:
      com.docker.network.bridge.name: ics_simlab
volumes:
  redis_data:
    driver: local
