services:
  redis:
    image: redis:7
    container_name: capstone-ai-redis
    restart: unless-stopped
    networks:
      - capstone-ai-net

  stage3:
    build:
      context: ./stage3
    image: capstone-stage3-service
    container_name: capstone-stage3
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    networks:
      - capstone-ai-net
    volumes:
      - ./stage3/outputs:/app/outputs

  django-web:
    build:
      context: ./backend
    image: capstone-django-backend
    container_name: capstone-django-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      STAGE3_BASE_URL: http://stage3:8001
      RAG_ENDPOINT: http://stage3:8001/generate-ir
      RAG_CHAT_ENDPOINT: http://stage3:8001/chat
    depends_on:
      - redis
      - stage3
    networks:
      - capstone-ai-net
    volumes:
      - ./backend/backend/db.sqlite3:/app/backend/db.sqlite3

  django-consumer:
    image: capstone-django-backend
    container_name: capstone-django-consumer
    restart: unless-stopped
    command: python manage.py consume_ai_alerts --host redis --port 6379 --stream ai_alerts
    environment:
      STAGE3_BASE_URL: http://stage3:8001
      RAG_ENDPOINT: http://stage3:8001/generate-ir
      RAG_CHAT_ENDPOINT: http://stage3:8001/chat
    depends_on:
      - redis
      - django-web
    networks:
      - capstone-ai-net
    volumes:
      - ./backend/backend/db.sqlite3:/app/backend/db.sqlite3

  stage12-producer:
    build:
      context: ./stage_1_2/stage2
    image: capstone-stage12-producer
    container_name: capstone-stage12-producer
    restart: "no"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_STREAM: ai_alerts
      PUBLISH_DELAY: 2
    depends_on:
      - redis
      - django-consumer
    networks:
      - capstone-ai-net

networks:
  capstone-ai-net:
    driver: bridge
