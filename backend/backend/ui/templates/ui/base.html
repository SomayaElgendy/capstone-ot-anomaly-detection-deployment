<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Water OT SOC{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: linear-gradient(135deg,#0f172a,#1e293b); color:white; }
    .nav-dark { background: rgba(0,0,0,.35); backdrop-filter: blur(10px); }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border-radius: 18px; }
    a { text-decoration: none; }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>
<nav class="navbar nav-dark px-3">
  <a class="navbar-brand text-white fw-bold" href="{% url 'ui:home' %}">💧 Water OT SOC</a>
  <div class="ms-auto d-flex gap-2">
    {% if user.is_authenticated %}
      <a class="btn btn-outline-light btn-sm" href="{% url 'ui:dashboard' %}">Dashboard</a>
      <a class="btn btn-outline-light btn-sm" href="{% url 'ui:ot_overview' %}">OT Overview</a>
      <a class="btn btn-danger btn-sm" href="{% url 'ui:logout' %}">Logout</a>
    {% else %}
      <a class="btn btn-outline-light btn-sm" href="{% url 'ui:login' %}">Login</a>
    {% endif %}
  </div>
</nav>

<div class="container py-4">
  {% block content %}{% endblock %}
</div>

{% block extra_js %}{% endblock %}
</body>
</html>
