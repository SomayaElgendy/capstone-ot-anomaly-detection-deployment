{% extends "ui/base.html" %}
{% block title %}OT Dashboard{% endblock %}

{% block extra_css %}
<style>
  .app-container,
  .container,
  .container-fluid,
  main {
    max-width: 100% !important;
    width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
  }

  .ot-fullscreen-wrap{
    width: 100vw;
    height: calc(100vh - 56px);
    margin: -1.5rem 0 0 0;
    padding: 0;
    overflow: hidden;
    background: #060b14;
    position: relative;
  }

  .ot-frame{
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #060b14;
  }

  .ot-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: linear-gradient(180deg, rgba(6,11,20,0.95), rgba(6,11,20,0.7));
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    z-index: 10;
  }

  .ot-bar-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ot-bar-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 0.72rem;
    font-weight: 700;
  }

  .ot-bar-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(34,197,94,0.4);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
{% endblock %}

{% block content %}
<div class="ot-fullscreen-wrap">
  <div class="ot-bar">
    <div class="ot-bar-title">
      <i class="bi bi-cpu" style="color: var(--blue-bright);"></i>
      OT Streamlit Dashboard
    </div>
    <div class="ot-bar-pill pill-live">
      <span class="dot"></span> Embedded
    </div>
  </div>
  <iframe
    class="ot-frame"
    src="{{ streamlit_url }}"
    title="OT Streamlit Dashboard">
  </iframe>
</div>
{% endblock %}
