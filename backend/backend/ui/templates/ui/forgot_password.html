{% extends "ui/base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}

<style>
.forgot-page {
  min-height: calc(100vh - 200px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.forgot-card {
  width: 100%;
  max-width: 480px;
  position: relative;
  overflow: hidden;
}

.forgot-card::before {
  content: "";
  position: absolute;
  top: -60px;
  right: -60px;
  width: 180px;
  height: 180px;
  background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 70%);
  pointer-events: none;
}

.forgot-header {
  text-align: center;
  margin-bottom: 1.5rem;
  position: relative;
  z-index: 1;
}

.forgot-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(59,130,246,0.08));
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: var(--radius-md);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  color: var(--blue-bright);
  margin-bottom: 1rem;
}

.forgot-header h3 {
  font-weight: 900;
  font-size: 1.4rem;
  margin: 0;
}

.forgot-header p {
  color: var(--text-secondary);
  font-size: 0.85rem;
  margin-top: 0.35rem;
}

.forgot-form {
  position: relative;
  z-index: 1;
}

.forgot-form .form-control {
  padding: 0.8rem 1rem;
  font-size: 0.9rem;
}

.back-login {
  margin-top: 1rem;
  text-align: center;
}

.back-login a {
  color: var(--blue-bright);
  text-decoration: none;
  font-size: 0.85rem;
}

.back-login a:hover {
  text-decoration: underline;
}
</style>

<div class="forgot-page">
  <div class="glass-card forgot-card p-4 p-md-5 animate-in">

    <div class="forgot-header">
      <div class="forgot-icon">
        <i class="bi bi-key-fill"></i>
      </div>
      <h3>Forgot Password?</h3>
      <p>Send a reset request to the admin.</p>
    </div>

    <form method="post" class="forgot-form">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Username or Email</label>
        <input
          class="form-control"
          type="text"
          name="username_or_email"
          placeholder="Enter your username or email"
          required
        >
      </div>

      <div class="mb-3">
        <label class="form-label">Message / Notes</label>
        <textarea
          class="form-control"
          name="message"
          rows="4"
          placeholder="Optional: explain the issue"
        ></textarea>
      </div>

      <button class="btn-soc btn-soc-primary w-100" type="submit">
        <i class="bi bi-send"></i> Send Request to Admin
      </button>
    </form>

    <div class="back-login">
      <a href="{% url 'ui:login' %}">
        <i class="bi bi-arrow-left"></i> Back to login
      </a>
    </div>

  </div>
</div>

{% endblock %}
